<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow To-Do</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="to-do-list">
            <div class="header-row">
                <div>
                    <p class="eyebrow">Today</p>
                    <h1 class="title">Task Flow</h1>
                </div>
                <span class="task-counter" id="task-counter">0 tasks</span>
            </div>

            <form class="ip-area" id="task-form">
                <input type="text" id="input-task" placeholder="What needs to be done?">
                <button type="submit" class="plus-icon" id="add-task-btn" aria-label="Add task">
                    <i class="fa-solid fa-plus"></i>
                </button>
            </form>

            <div class="filter-row">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <div class="task-list">
                <ul id="todo-tasks"></ul>
                <div class="empty-state" id="empty-state">
                    <i class="fa-solid fa-clipboard-check"></i>
                    <p>No tasks yet. Add your first one!</p>
                </div>
            </div>

            <button class="clear-btn" id="clear-completed">Clear completed</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
