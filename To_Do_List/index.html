<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <div class="to-do-list">
            <h1 class="title">To-Do-List</h1>
            <form action="" class="ip-area">
                <input type="text" name="" id="input-task" placeholder="Enter the task......">
                <button type="submit" class="plus-icon" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
            </form>
            <div class="task-list">
                <ul id="todo-tasks"></ul>
                <img src="image.png" alt="All the tasks are done" class="empty-img">
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
